<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trip</title>
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }
    ul,ol,li{
      list-style:none;
    }
    a{
      color:#000;
      text-decoration:none;
    }

    /* 기본스타일 */
    .wrap{
      padding:10px;
    }
    .header{      
      padding:40px 14px;
      background-color:#93c;
    }
    h1 a{
      font-size:32px;
      color:#fff;
    }
    .sec{
      padding:14px;
      display:flex;
      flex-flow:row wrap;
    }
    .sec-child{
      width:25%;
    }
    .sec-child02{
      width:50%;
    }
    nav li{
      margin-bottom:7px;
      padding:7px;
      background-color:#09c;
    }
    nav li:hover{
      background-color:#069;
    }
    nav a{
      color:#fff;
    }
    article{
      padding:20px 40px;
    }
    article h2{
      margin-bottom:14px;
      font-size:32px;
    }
    aside{
      padding:32px 14px;
      background-color:#09c;
    }
    aside h2{
      margin-bottom:14px;
      font-size:26px;
      color:#fff;
      text-align:center;
    }
    aside p{
      margin-bottom:14px;      
      color:#fff;
      text-align:center;
    }
    .footer{
      padding:32px;
      background-color:#069;
    }
    address{
      font-style:normal;
      color:#fff;
      text-align:center;
    }


    /* 768px 이하 스타일 */
    @media (max-width:768px){
      .sec-child01{
        width:40%;
      }
      .sec-child02{
        width:60%;
      }
      .sec-child03{
        width:100%;
      }
    }

    /* 600px 이하 스타일 */
    @media (max-width:600px){
      .sec-child{
        width:100%;
      }
    }
  </style>
</head>
<body>
  <section class="wrap">
    <header class="header">
      <h1><a href="#">떠나가 볼까?</a></h1>
    </header>
    <section class="sec">
      <nav class="sec-child sec-child01">
        <ul>
          <li><a href="#">비행편</a></li>
          <li><a href="#">도시여행</a></li>
          <li><a href="#">섬여행</a></li>
          <li><a href="#">식도락</a></li>
        </ul>
      </nav>
      <article class="sec-child sec-child02">
        <h2>도시여행</h2>
        <p>하니아는 크레타 섬에 있는 하니아 지역의 수도입니다. 도시는 구시가지와 현대시가지 두 부분으로 나눌 수 있다.</p>
      </article>
      <aside class="sec-child sec-child03">
        <ul>
          <li>
            <h2>뭐?</h2>
            <p>하니아는 크레타섬에 있는 도시입니다.</p>
          </li>
          <li>
            <h2>어디에?</h2>
            <p>크레타섬은 그리스 지중에 한가운데 있습니다.</p>
          </li>
          <li>
            <h2>어떻게?</h2>
            <p>유럽 전역에서 하니아 공항으로 직항이 개설되어 있습니다.</p>
          </li>
        </ul>
      </aside>
    </section>
    <footer class="footer">
      <address>
        브라우저의 폭을 조정하여 폭에 대한 컨텐츠의 변화를 확인하세요.
      </address>
    </footer>
  </section>
</body>
</html>
